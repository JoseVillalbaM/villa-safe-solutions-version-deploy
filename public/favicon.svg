<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000c1f" />
      <stop offset="100%" style="stop-color:#023859" />
    </linearGradient>

    <linearGradient id="villaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#93c5fd" />
      <stop offset="100%" style="stop-color:#3b82f6" />
    </linearGradient>

    <linearGradient id="safeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399" />
      <stop offset="100%" style="stop-color:#10b981" />
    </linearGradient>

    <linearGradient id="solGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.4" />
      <stop offset="50%" style="stop-color:#d1d5db;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0.4" />
    </linearGradient>

    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0" />
      <stop offset="25%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0" />
    </linearGradient>

    <linearGradient id="topLineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0" />
    </linearGradient>

    <filter id="blueGlow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.23  0 0 0 0 0.51  0 0 0 0 0.96  0 0 0 0.6 0" result="colorBlur"/>
      <feMerge>
        <feMergeNode in="colorBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="greenGlow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.063  0 0 0 0 0.725  0 0 0 0 0.506  0 0 0 0.6 0" result="colorBlur"/>
      <feMerge>
        <feMergeNode in="colorBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="subtleGlow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="0.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="ambientGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="12" ry="12" fill="url(#bgGrad)"/>

  <!-- Inner border -->
  <rect x="0.8" y="0.8" width="62.4" height="62.4" rx="11" ry="11"
        fill="none" stroke="rgba(59,130,246,0.18)" stroke-width="0.7"/>

  <!-- Corner tech brackets -->
  <path d="M8 1.5 L1.5 1.5 L1.5 8" fill="none" stroke="#3b82f6" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
  <path d="M56 62.5 L62.5 62.5 L62.5 56" fill="none" stroke="#10b981" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
  <path d="M56 1.5 L62.5 1.5 L62.5 8" fill="none" stroke="#3b82f6" stroke-width="0.5" stroke-linecap="round" opacity="0.22"/>
  <path d="M8 62.5 L1.5 62.5 L1.5 56" fill="none" stroke="#10b981" stroke-width="0.5" stroke-linecap="round" opacity="0.22"/>

  <!-- Ambient glows -->
  <circle cx="20" cy="22" r="13" fill="rgba(59,130,246,0.07)" filter="url(#ambientGlow)"/>
  <circle cx="45" cy="42" r="11" fill="rgba(16,185,129,0.07)" filter="url(#ambientGlow)"/>

  <!-- Top separator line -->
  <line x1="6" y1="13" x2="58" y2="13"
        stroke="url(#topLineGrad)" stroke-width="0.5" stroke-linecap="round" opacity="0.6"/>

  <!-- VILLA — large, bold, sky blue -->
  <text
    x="32" y="30"
    text-anchor="middle"
    font-family="'Arial Black', 'Helvetica Neue', sans-serif"
    font-size="20"
    font-weight="900"
    letter-spacing="2"
    fill="url(#villaGrad)"
    filter="url(#blueGlow)"
  >VILLA</text>

  <!-- Divider between VILLA and SAFE -->
  <line x1="10" y1="33" x2="54" y2="33"
        stroke="url(#lineGrad)" stroke-width="0.5" stroke-linecap="round" opacity="0.5"/>

  <!-- SAFE — medium, emerald -->
  <text
    x="32" y="46"
    text-anchor="middle"
    font-family="'Arial Black', 'Helvetica Neue', sans-serif"
    font-size="12"
    font-weight="700"
    letter-spacing="4.5"
    fill="url(#safeGrad)"
    filter="url(#greenGlow)"
  >SAFE</text>

  <!-- SOLUTIONS — small, crisp -->
  <text
    x="32" y="55"
    text-anchor="middle"
    font-family="'Arial', 'Helvetica Neue', sans-serif"
    font-size="5"
    font-weight="400"
    letter-spacing="2.2"
    fill="url(#solGrad)"
    filter="url(#subtleGlow)"
  >SOLUTIONS</text>

  <!-- Bottom accent line -->
  <line x1="6" y1="59.5" x2="58" y2="59.5"
        stroke="url(#lineGrad)" stroke-width="0.8" stroke-linecap="round"/>

  <!-- End dots -->
  <circle cx="6" cy="59.5" r="1" fill="#3b82f6" opacity="0.7"/>
  <circle cx="58" cy="59.5" r="1" fill="#10b981" opacity="0.7"/>
</svg>